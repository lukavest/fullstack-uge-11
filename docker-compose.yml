

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grill-chef-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/food_order.db
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - grill-chef-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grill-chef-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - grill-chef-network
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  backend_db:

networks:
  grill-chef-network:
    driver: bridge
