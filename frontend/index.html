<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            <img src="/frontend/images/banner.jpg" class="banner" alt="restaurant-banner-name">
            <nav>
                <ul>
                    <li class="back-icon">
                        <img src="/frontend/images/arrow.png" class="icon" alt="back-button">
                    </li>
                    <li class="align-right">
                        <img src="/frontend/images/burger-bar.png" class="icon" alt="burger-icon">
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="profile-section">
                <div class="profile-pic"></div>
                <h2 class="restaurant-name">Grill Chef<br>Mediterranean Kitch</h2>
                <div class="search-bar">
                    <span class="search-icon">&#128269;</span>
                    <input type="text" placeholder="Søg madvarer">
                </div>
            </section>

            <section class="menu-list" id="menu-list"></section>

            <section class="order-summary" id="order-summary">
                <h3>Your order</h3>
                <ul id="order-items"></ul>
                <div class="order-total">
                    <hr>
                    <div class="total-row">
                        <span>Total price:</span>
                        <span id="total-price">$0</span>
                    </div>
                </div>
            </section>

            <button class="complete-order-btn">Complete order</button>
        </main>

        <script type="module" src="script_new.js"></script>
    </body>
</html>
